<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF QA Bot</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; }
  .container { max-width: 800px; margin: 30px auto; padding: 20px; }
  h1 { text-align: center; margin-bottom: 20px; color: #333; }
  .upload-box { background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
  .upload-box input { width: 100%; padding: 8px; margin-bottom: 10px; }
  .upload-box button { padding: 10px 20px; background: #333; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
  .upload-box button:hover { background: #555; }
  #upload-status { margin-top: 10px; font-size: 13px; color: #555; }
  .chat-box { background: #fff; border-radius: 8px; border: 1px solid #ddd; overflow: hidden; }
  #messages { height: 400px; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .msg { padding: 10px 14px; border-radius: 8px; max-width: 80%; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
  .msg.user { background: #333; color: #fff; align-self: flex-end; }
  .msg.bot { background: #f0f0f0; color: #222; align-self: flex-start; }
  .input-row { display: flex; border-top: 1px solid #ddd; }
  #question { flex: 1; padding: 12px; border: none; outline: none; font-size: 14px; }
  #send-btn { padding: 12px 20px; background: #333; color: #fff; border: none; cursor: pointer; font-size: 14px; }
  #send-btn:hover { background: #555; }
  #send-btn:disabled { background: #aaa; }
</style>
</head>
<body>
<div class="container">
  <h1>PDF QA Bot</h1>
  
  <div class="upload-box">
    <input type="file" id="pdf-file" accept=".pdf">
    <button onclick="uploadPDF()">Upload & Process PDF</button>
    <div id="upload-status"></div>
  </div>

  <div class="chat-box">
    <div id="messages"></div>
    <div class="input-row">
      <input type="text" id="question" placeholder="Ask a question about the PDF..." onkeydown="if(event.key==='Enter') sendQuestion()">
      <button id="send-btn" onclick="sendQuestion()">Send</button>
    </div>
  </div>
</div>

<script>
  let sessionId = null;

  async function uploadPDF() {
    const file = document.getElementById('pdf-file').files[0];
    if (!file) { alert('Please select a PDF file'); return; }
    
    const status = document.getElementById('upload-status');
    status.textContent = 'Processing PDF... please wait';
    
    const formData = new FormData();
    formData.append('file', file);
    
    try {
      const res = await fetch('/upload', { method: 'POST', body: formData });
      const data = await res.json();
      sessionId = data.session_id;
      status.textContent = '✅ ' + data.message;
      addMessage('bot', 'PDF loaded! You can now ask me anything about it.');
    } catch (err) {
      status.textContent = '❌ Error: ' + err.message;
    }
  }

  async function sendQuestion() {
    const input = document.getElementById('question');
    const question = input.value.trim();
    if (!question) return;
    if (!sessionId) { alert('Please upload a PDF first'); return; }
    
    input.value = '';
    addMessage('user', question);
    document.getElementById('send-btn').disabled = true;
    addMessage('bot', 'Thinking...');
    
    const formData = new FormData();
    formData.append('question', question);
    formData.append('session_id', sessionId);
    
    try {
      const res = await fetch('/ask', { method: 'POST', body: formData });
      const data = await res.json();
      removeLastBot();
      addMessage('bot', data.answer);
    } catch (err) {
      removeLastBot();
      addMessage('bot', '❌ Error: ' + err.message);
    }
    
    document.getElementById('send-btn').disabled = false;
  }

  function addMessage(role, text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeLastBot() {
    const messages = document.getElementById('messages');
    const bots = messages.querySelectorAll('.msg.bot');
    if (bots.length) bots[bots.length - 1].remove();
  }
</script>
</body>
</html>
